<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ApplyHQ</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="app-header">
        <div>
            <h1>ApplyHQ</h1>
            <p>Verwalte deine Bewerbungen an einem Ort.</p>
        </div>

        <button class="theme-toggle" type="button" aria-label="Darstellung umschalten">
            <img src="assets/icons/icon_moon.svg" alt="">
        </button>
    </header>

    <main>
        <section class="section-heading" aria-labelledby="overview-title">
            <h2 id="overview-title">Übersicht</h2>
        </section>

        <section id="overview" aria-label="Bewerbungsübersicht">
            <div class="overview-card">
                <div class="overview-card-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960">
                        <path
                            d="M320-240h320v-80H320v80Zm0-160h320v-80H320v80ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"
                            fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <p id="overview-open">12</p>
                    <p>Offene Bewerbungen</p>
                </div>
            </div>

            <div class="overview-card">
                <div class="overview-card-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960">
                        <path
                            d="m720-160-56-56 63-64H560v-80h167l-63-64 56-56 160 160-160 160ZM160-280q-33 0-56.5-23.5T80-360v-400q0-33 23.5-56.5T160-840h520q33 0 56.5 23.5T760-760v204q-10-2-20-3t-20-1q-10 0-20 .5t-20 2.5v-147L416-520 160-703v343h323q-2 10-2.5 20t-.5 20q0 10 1 20t3 20H160Zm58-480 198 142 204-142H218Zm-58 400v-400 400Z"
                            fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <p id="overview-applied">12</p>
                    <p>Beworben</p>
                </div>
            </div>

            <div class="overview-card">
                <div class="overview-card-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960">
                        <path
                            d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM247-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47Zm466 0q-47 47-113 47-11 0-28-2.5t-28-5.5q27-32 41.5-71t14.5-81q0-42-14.5-81T544-792q14-5 28-6.5t28-1.5q66 0 113 47t47 113q0 66-47 113ZM120-240h480v-32q0-11-5.5-20T580-306q-54-27-109-40.5T360-360q-56 0-111 13.5T140-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q440-607 440-640t-23.5-56.5Q393-720 360-720t-56.5 23.5Q280-673 280-640t23.5 56.5Q327-560 360-560t56.5-23.5ZM360-240Zm0-400Z"
                            fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <p id="overview-interviews">12</p>
                    <p>Interviews</p>
                </div>
            </div>

            <div class="overview-card">
                <div class="overview-card-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960">
                        <path
                            d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                            fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <p id="overview-rejections">12</p>
                    <p>Absagen</p>
                </div>
            </div>

            <div class="overview-card">
                <div class="overview-card-icon">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960">
                        <path
                            d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
                            fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <p id="overview-accepted">12</p>
                    <p>Zusagen</p>
                </div>
            </div>

        </section>
        <section id="applications">
            <form id="new-application" class="panel">
                <h2>Neue Bewerbung anlegen</h2>
                <label for="application-company">Unternehmen <span aria-hidden="true">*</span></label>
                <input id="application-company" type="text" placeholder="z. B. Tech Solutions GmbH" required>

                <label for="application-position">Stellenbezeichnung <span aria-hidden="true">*</span></label>
                <input id="application-position" type="text" placeholder="z. B. Frontend Entwickler (m/w/d)" required>
                
                <div class="horizontal-orientation">
                    <div class="vertical-orientation">
                        <label for="application-date">Bewerbungsdatum</label>
                        <input id="application-date" type="date" value="2026-07-09">
                    </div>
                    
                    <div class="vertical-orientation">
                        <label for="application-status">Status</label>
                        <select id="application-status" name="status">
                            <option value="open">Offen</option>
                            <option value="applied">Beworben</option>
                            <option value="interview">Interview</option>
                            <option value="rejected">Absage</option>
                            <option value="accepted">Zusage</option>
                        </select>
                    </div>
                </div>

                <label for="application-notes">Notizen</label>
                <textarea id="application-notes" rows="3" placeholder="Notizen zur Bewerbung (optional)"></textarea>
                <button id="add-application-button" type="submit">
                    <img src="assets/icons/icon_plus.svg">
                    <p>Bewerbung hinzufügen</p>
                </button>

            </form>

            <section id="application-overview" class="panel">
                <div class="panel-header">
                    <div>
                        <h2>Deine Bewerbungen (<span id="application-count">0</span>)</h2>
                    </div>
                    <label class="sort-control" for="application-sort">
                        <span>Sortierung:</span>
                        <select id="application-sort" name="application-sort">
                            <option value="newest">Neueste zuerst</option>
                            <option value="oldest">Älteste zuerst</option>
                        </select>
                    </label>
                </div>

                <div class="empty-state">
                    <p>Noch keine Bewerbungen vorhanden.</p> 
                </div>
                <div id="application-list"></div>
            </section>
        </section>
        
    </main>

    <script src="js/applications.js"></script>
    <script src="js/render.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
