<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#5229D3">

    <title>ApplyHQ</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <input class="sidebar-toggle" id="sidebar-toggle" type="checkbox" aria-hidden="true">
    <label class="sidebar-menu-button" for="sidebar-toggle" aria-label="Menü öffnen">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <aside class="app-sidebar" aria-label="Hauptnavigation">
        <div id="main-logo">
            <img src="assets/icons/ApplyHQ_Icon_large.png" alt="">
            <span>ApplyHQ</span>
        </div>

        <div class="navigation">
            <nav aria-label="Primär">
                <ul class="navbar">
                    <li>
                        <a class="navbar-button" href="#dashboard" data-view="dashboard" data-action="loadDashboard">
                            <img src="assets/icons/icon_home.svg" alt="">
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a class="navbar-button" href="#">
                            <img src="assets/icons/icon_note.svg" alt="">
                            <span>Bewerbungen</span>
                        </a>
                    </li>
                    <li>
                        <a class="navbar-button" href="#">
                            <img src="assets/icons/icon_search.svg" alt="">
                            <span>Jobs suchen</span>
                        </a>
                    </li>
                    <li>
                        <a class="navbar-button" href="#">
                            <img src="assets/icons/icon_notes.svg" alt="">
                            <span>Dokumente</span>
                        </a>
                    </li>
                    <li>
                        <a class="navbar-button" href="#">
                            <img src="assets/icons/icon_person.svg" alt="">
                            <span>Profil</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <nav aria-label="Einstellungen">
                <ul class="navbar navbar-bottom">
                    <li>
                        <a id="navbar-settings" class="navbar-button" data-view="settings" data-action="loadSettings">
                            <img src="assets/icons/icon_gears.svg" alt="">
                            <span>Einstellungen</span>
                        </a>
                    </li>
                    <li>
                        <button class="sidebar-collapse" type="button" aria-label="Sidebar einklappen">
                            <span aria-hidden="true">&lsaquo;</span>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <label class="sidebar-backdrop" for="sidebar-toggle" aria-label="Menü schließen"></label>

    <div class="app-content">
        <header class="app-header">
            <div>
                <h1>Guten Morgen, Alexander!</h1>
                <p>Hier ist der aktuelle Stand deiner Bewerbungen.</p>
            </div>

            <button class="theme-toggle" type="button" aria-label="Darstellung umschalten">
                <img src="assets/icons/icon_moon.svg" alt="">
            </button>
        </header>

        <main id="app" aria-live="polite"></main>
    </div>

    <script src="js/applications.js"></script>
    <script src="js/applicationCards.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/applicationModal.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
    <script src="js/filterOptions.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/dataManagement.js"></script>
</body>

</html>
